<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>المساعد الذكي لمكتبة الفجر الرقمية</title>
    <link rel="icon" type="image/x-icon" href="img/mozlee.jpg">
    
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #16161f;
            --bg-hover: #1e1e2a;
            --gold: #d4a853;
            --gold-light: #f0d078;
            --gold-dark: #b8922e;
            --surface-light: #222240;
            --text-primary: #f0ede8;
            --text-secondary: #b8b5ae;
            --text-muted: #8a8680;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-gold: rgba(212, 168, 83, 0.25);
            --radius-sm: 10px;
            --radius-md: 16px;
            --max-chat-width: 800px;
            --sidebar-width: 250px;
            --header-height: 56px;
            --input-area-height: 130px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(212, 168, 83, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(108, 92, 231, 0.03) 0%, transparent 55%);
        }

        .container {
            display: flex;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile */
            max-width: 100%;
            margin: 0 auto;
            overflow: hidden;
        }

        /* ====== الشريط الجانبي ====== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
            height: 100%;
            overflow-y: auto;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            z-index: 2;
        }

        .sidebar-brand {
            text-align: center;
            padding: 20px 16px 14px;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
            flex-shrink: 0;
        }

        .sidebar-brand .brand-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: block;
            margin: 0 auto 8px;
            object-fit: cover;
            border: 2px solid var(--border-gold);
            box-shadow: 0 0 20px rgba(212, 168, 83, 0.12);
        }

        .sidebar-brand h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .sidebar-brand p {
            font-size: 10px;
            color: var(--gold);
            margin-top: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sidebar-section-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 14px 16px 8px;
            flex-shrink: 0;
        }

        .pages-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px;
        }

        .page-btn {
            padding: 10px 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: right;
            position: relative;
            min-height: 40px;
        }

        .page-btn i {
            font-size: 14px;
            width: 18px;
            text-align: center;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .page-btn span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .page-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .page-btn.active {
            background: rgba(212, 168, 83, 0.1);
            color: var(--gold-light);
            font-weight: 600;
            border: 1px solid var(--border-gold);
        }

        .page-btn.active i {
            color: var(--gold);
        }

        .page-btn.ai-assistant-btn {
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.1), rgba(240, 208, 120, 0.04));
            border: 1px solid rgba(212, 168, 83, 0.3);
            margin-top: 4px;
        }

        .page-btn.ai-assistant-btn i {
            color: var(--gold-light);
            animation: sparkle 2s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 0 8px rgba(240, 208, 120, 0.4); }
        }

        .page-btn .delete-page {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 9px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover .delete-page {
            display: flex;
        }

        .page-btn .delete-page:hover {
            background: rgba(220, 80, 80, 0.2);
            color: #dc5050;
        }

        .add-page-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: calc(100% - 16px);
            padding: 9px;
            margin: 4px 8px 12px;
            border: 1px dashed var(--border-gold);
            border-radius: var(--radius-sm);
            background: rgba(212, 168, 83, 0.03);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
            flex-shrink: 0;
        }

        .add-page-btn:hover {
            background: rgba(212, 168, 83, 0.08);
            border-color: var(--gold-light);
            color: var(--gold-light);
        }

        .add-page-btn i {
            font-size: 13px;
            color: var(--gold);
        }

        /* ====== Main Content ====== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            min-width: 0;
            height: 100%;
            overflow: hidden;
        }

        /* ====== شاشة الترحيب ====== */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            max-width: var(--max-chat-width);
            padding: 20px;
            text-align: center;
            overflow-y: auto;
            margin: 0 auto;
        }

        .welcome-screen.hidden {
            display: none;
        }

        .welcome-icon {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(212, 168, 83, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 460px;
        }

        .feature-card {
            background: var(--surface-light);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .feature-card:active {
            transform: scale(0.96);
        }

        .feature-card i {
            font-size: 22px;
            color: var(--gold-light);
            margin-bottom: 8px;
            display: block;
        }

        .feature-card span {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ====== Chat Container ====== */
        .chat-container {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            width: 100%;
            max-width: var(--max-chat-width);
            flex-direction: column;
            gap: 10px;
            margin: 0 auto;
            height: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .chat-container.active {
            display: flex;
        }

        /* ====== Messages ====== */
        .message {
            display: flex;
            gap: 8px;
            animation: messageAppear 0.3s ease;
            max-width: 85%;
            width: fit-content;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-content {
            background: var(--surface-light);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 4px;
            word-break: break-word;
            max-width: 100%;
        }

        .message.user .message-content {
            background: rgba(108, 92, 231, 0.2);
            border-color: rgba(108, 92, 231, 0.3);
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: var(--surface-light);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        .message-text img {
            max-width: 100%;
            border-radius: 10px;
            margin: 4px 0;
            cursor: pointer;
        }

        .message-time {
            font-size: 9px;
            color: var(--text-secondary);
            text-align: left;
            opacity: 0.7;
            margin-top: 2px;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* ====== Typing Indicator ====== */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--surface-light);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            width: fit-content;
            margin: 0 16px 4px;
            flex-shrink: 0;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .typing-text {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ====== Input Area ====== */
        .input-area {
            padding: 8px 12px 12px;
            width: 100%;
            max-width: var(--max-chat-width);
            flex-shrink: 0;
            background: var(--bg-primary);
            margin: 0 auto;
            border-top: 1px solid var(--border-subtle);
        }

        .suggestions-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 8px;
            justify-content: center;
        }

        .suggestion-btn {
            padding: 4px 12px;
            background: var(--surface-light);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'Tajawal', sans-serif;
        }

        .suggestion-btn:active {
            transform: scale(0.95);
        }

        .suggestion-btn i {
            color: var(--accent);
            margin-left: 3px;
        }

        .input-container {
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 10px 44px 10px 12px;
            background: var(--surface-light);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
            resize: none;
            min-height: 42px;
            max-height: 100px;
            line-height: 1.4;
            font-family: 'Tajawal', sans-serif;
        }

        #userInput:focus {
            border-color: var(--border-gold);
            box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.06);
        }

        #userInput::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .input-icons {
            position: absolute;
            left: 6px;
            bottom: 6px;
            display: flex;
            gap: 3px;
        }

        .input-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            border: none;
        }

        .input-icon:active {
            transform: scale(0.9);
        }

        #actionButton {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            border: none;
            color: #1a1a1a;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--gold);
            box-shadow: 0 4px 14px rgba(212, 168, 83, 0.3);
        }

        #actionButton:active {
            transform: scale(0.92);
        }

        #actionButton.voice-mode {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        }

        #actionButton.send-mode {
            background: var(--gold-light);
        }

        #actionButton.recording {
            background: #dc5050;
            box-shadow: 0 4px 16px rgba(220, 80, 80, 0.35);
            animation: pulseRecord 1.5s infinite;
        }

        @keyframes pulseRecord {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 80, 80, 0.3); }
            50% { box-shadow: 0 0 0 10px rgba(220, 80, 80, 0); }
        }

        /* ====== Modals ====== */
        .modal-overlay, .confirm-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active, .confirm-overlay.active {
            display: flex;
        }

        .modal-dialog, .confirm-dialog {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .modal-dialog h3 {
            color: var(--text-primary);
            font-size: 17px;
            margin-bottom: 6px;
        }

        .modal-dialog p, .confirm-dialog p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .modal-dialog input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            text-align: center;
            font-family: 'Tajawal', sans-serif;
            margin-bottom: 14px;
        }

        .modal-dialog input:focus {
            border-color: var(--border-gold);
        }

        .modal-buttons, .confirm-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .modal-btn {
            padding: 8px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .modal-btn-confirm {
            background: var(--gold);
            color: #1a1a1a;
        }

        .modal-btn-confirm:active {
            transform: scale(0.95);
        }

        .modal-btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .modal-btn-cancel:active {
            transform: scale(0.95);
        }

        .confirm-dialog .modal-btn-confirm {
            background: #dc5050;
            color: white;
        }

        /* ====== Toast ====== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 10px 18px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-md);
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 12px;
            color: var(--text-primary);
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ====== Image Modal ====== */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-modal img {
            max-width: 95%;
            max-height: 85%;
            border-radius: var(--radius-md);
            object-fit: contain;
        }

        .close-image-modal {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .close-image-modal:active {
            transform: scale(0.9);
        }

        /* ====== Voice Indicator ====== */
        .voice-indicator {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-md);
            z-index: 1000;
            border: 1px solid var(--border-subtle);
            text-align: center;
            width: 180px;
        }

        .voice-waves {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 20px;
            margin: 10px 0;
            justify-content: center;
        }

        .voice-wave {
            width: 3px;
            background: var(--gold);
            border-radius: 2px;
            animation: voiceWave 1.2s infinite;
        }

        .voice-wave:nth-child(2) { animation-delay: 0.1s; }
        .voice-wave:nth-child(3) { animation-delay: 0.2s; }
        .voice-wave:nth-child(4) { animation-delay: 0.3s; }
        .voice-wave:nth-child(5) { animation-delay: 0.4s; }

        @keyframes voiceWave {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        .voice-indicator h3 {
            color: white;
            font-size: 14px;
        }

        .voice-indicator p {
            color: var(--text-secondary);
            font-size: 11px;
        }

        /* ====== Scrollbar ====== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(212, 168, 83, 0.2);
            border-radius: 3px;
        }

        /* ====== Mobile Menu ====== */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            z-index: 2300;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .mobile-sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 2400;
        }

        .mobile-sidebar-overlay.active {
            display: block;
        }

        /* ====== Mobile Styles ====== */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .mobile-menu-btn {
                display: flex !important;
            }

            .sidebar {
                position: fixed;
                top: 0;
                right: -100%;
                width: 270px;
                height: 100%;
                z-index: 2500;
                transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: -8px 0 30px rgba(0, 0, 0, 0.5);

<body>

            </div>

    <!-- Confirm Modal -->

            <p id="confirmMessage">هل أنت متأكد؟</p>
            <div class="confirm-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeConfirmModal(false)">إلغاء</button>
                <button class="modal-btn modal-btn-confirm" onclick="closeConfirmModal(true)">حذف</button>
            </div>

    <div class="container">

            <button class="add-page-btn" onclick="openAddPageModal()">

            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">🎬</div>
                <h2 class="welcome-title">مرحباً بك في مكتبة الفجر</h2>
                <p class="welcome-subtitle">اسألني عن أي شيء: الوقت، الكتب، إنشاء الصور، وأكثر!</p>
                <div class="features-grid">
                    <div class="feature-card" onclick="sendSuggestion('ما هو الوقت والتاريخ الآن؟')">
                        <i class="fas fa-clock"></i>
                        <span>الوقت والتاريخ</span>
                    </div>
                    <div class="feature-card" onclick="sendSuggestion('أنشئ لي صورة لأسد')">
                        <i class="fas fa-image"></i>
                        <span>إنشاء صورة</span>
                    </div>
                    <div class="feature-card" onclick="sendSuggestion('ما هي الكتب الأكثر مبيعاً؟')">
                        <i class="fas fa-chart-line"></i>
                        <span>الأكثر مبيعاً</span>
                    </div>
                    <div class="feature-card" onclick="sendSuggestion('حلل هذه الصورة...')">
                        <i class="fas fa-search"></i>
                        <span>تحليل صورة</span>

            <!-- Chat Container -->
            <div class="chat-container" id="chatContainer"></div>

            <!-- Typing Indicator -->

                    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>

            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="suggestions-bar" id="suggestionsBar">
                    <button class="suggestion-btn" onclick="sendSuggestion('الوقت والتاريخ')">
                        <i class="fas fa-clock"></i> الوقت
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('أنشئ صورة')">
                        <i class="fas fa-image"></i> صورة
                    </button>
                    <button class="suggestion-btn" onclick="sendSuggestion('كتب الأكثر مبيعاً')">
                        <i class="fas fa-chart-line"></i> كتب
                    </button>
                </div>
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="userInput" rows="1" placeholder="اكتب رسالتك..." autocomplete="off"></textarea>
                        <div class="input-icons">
                            <button class="input-icon" onclick="toggleAttachment()" title="رفع صورة">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        </div>

                    <button id="actionButton" class="voice-mode" onclick="handleAction()">
                        <i class="fas fa-microphone"></i>
                    </button>

            </div>
        </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        // ====== المتغيرات العامة ======
        let isRecording = false;
        let recognition = null;
        let isVoiceSupported = false;
        let imagesGenerated = 0;
        let aiKnowledge = {};
        let pages = [];
        let currentPage = 'home';
        let pageCounter = 0;
        let pageConversations = {};
        let confirmCallback = null;
        let toastTimeout = null;

        // ====== عناصر DOM ======
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const userInput = document.getElementById('userInput');
        const actionButton = document.getElementById('actionButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const voiceIndicator = document.getElementById('voiceIndicator');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const imageUpload = document.getElementById('imageUpload');
        const pagesList = document.getElementById('pagesList');
        const addPageModal = document.getElementById('addPageModal');
        const newPageNameInput = document.getElementById('newPageNameInput');
        const sidebar = document.getElementById('sidebar');
        const mobileSidebarOverlay = document.getElementById('mobileSidebarOverlay');
        const confirmModal = document.getElementById('confirmModal');
        const confirmMessage = document.getElementById('confirmMessage');

        // ====== الصفحات الافتراضية ======
        const defaultPages = [
            { id: 'home', name: 'الرئيسية', icon: 'fa-home' },
            { id: 'books', name: 'المكتبة', icon: 'fa-book-open' },
            { id: 'images', name: 'الصور', icon: 'fa-image' },
            { id: 'catalog', name: 'الفهرس الرقمي', icon: 'fa-list' },
            { id: 'ai-assistant', name: 'المساعد الذكي', icon: 'fa-robot', isAi: true }
        ];

        // ====== تهيئة ======
        function init() {
            loadPages();
            imagesGenerated = parseInt(localStorage.getItem('imagesGenerated')) || 0;
            setupEventListeners();
            setupVoiceRecognition();
            loadAllConversations();
            loadDefaultKnowledge();
            updateDateTime();
            setInterval(updateDateTime, 60000);
            autoResizeTextarea();
            updateActionButton();
            switchPage('home');
            
            // Fix for mobile: ensure input area is visible
            setTimeout(() => {
                if (window.innerWidth <= 768) {
                    document.querySelector('.main-content').style.paddingBottom = '0';
                }
            }, 100);
        }

        // ====== إدارة الصفحات ======
        function loadPages() {
            const saved = localStorage.getItem('pages');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    pages = [...defaultPages];
                    parsed.forEach(p => {
                        if (!pages.find(m => m.id === p.id)) pages.push(p);
                    });
                } catch (e) {
                    pages = JSON.parse(JSON.stringify(defaultPages));
                }
            } else {
                pages = JSON.parse(JSON.stringify(defaultPages));
            }
            renderPages();
        }

        function savePages() {
            const custom = pages.filter(p => !defaultPages.find(d => d.id === p.id));
            localStorage.setItem('pages', JSON.stringify(custom));
        }

        function renderPages() {
            pagesList.innerHTML = '';
            pages.forEach(page => {
                const btn = document.createElement('button');
                btn.className = `page-btn ${page.id === currentPage ? 'active' : ''} ${page.isAi ? 'ai-assistant-btn' : ''}`;
                
                btn.innerHTML = `<i class="fas ${page.icon}"></i><span>${page.name}</span>`;
                
                if (!defaultPages.find(d => d.id === page.id)) {
                    btn.innerHTML += `<button class="delete-page" onclick="event.stopPropagation(); requestDeletePage('${page.id}')"><i class="fas fa-times"></i></button>`;
                }
                
                btn.onclick = () => {
                    if (page.isAi) {
                        switchPage(page.id);
                        userInput.value = 'مرحباً، أحتاج مساعدتك';
                        userInput.dispatchEvent(new Event('input'));
                        processUserInput('مرحباً، أحتاج مساعدتك');
                    } else {
                        switchPage(page.id);
                    }
                    if (window.innerWidth <= 768) closeMobileSidebar();
                };
                pagesList.appendChild(btn);
            });
        }

        function switchPage(pageId) {
            saveCurrentConversation();
            currentPage = pageId;
            renderPages();
            
            chatContainer.innerHTML = '';
            
            if (!pageConversations[pageId]) {
                pageConversations[pageId] = [];
            }
            
            const conv = pageConversations[pageId];
            
            if (conv.length === 0) {
                welcomeScreen.classList.remove('hidden');
                chatContainer.classList.remove('active');
            } else {
                welcomeScreen.classList.add('hidden');
                chatContainer.classList.add('active');
                conv.forEach(msg => {
                    renderMessageToChat(msg.text, msg.sender, msg.time);
                });
                setTimeout(() => {
                    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'auto' });
                }, 50);
            }
        }

        function saveCurrentConversation() {}

        function renderMessageToChat(text, sender, timeStr) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            formatted = formatted.replace(/!\[(.*?)\]\((.*?)\)/g, (match, alt, src) => {
                return `<img src="${src}" alt="${alt}" onclick="openImageModal('${src}')" style="max-width:200px;max-height:200px;border-radius:8px;cursor:pointer;margin:4px 0;">`;
            });
            
            const avatarImg = sender === 'ai' ? 'img/mozlee.jpg' : '';
            const avatarFallback = sender === 'ai' ? '🤖' : '👤';
            
            div.innerHTML = `
                <div class="avatar">${avatarImg ? `<img src="${avatarImg}" alt="" onerror="this.innerHTML='${avatarFallback}'; this.style.background='linear-gradient(135deg, #d4a853, #b8922e)'; this.style.display='flex'; this.style.alignItems='center'; this.style.justifyContent='center'; this.style.color='#1a1a1a'; this.style.fontSize='16px';">` : `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg, #ff9a9e, #fad0c4);color:white;">${avatarFallback}</span>`}</div>
                <div class="message-content">
                    <div class="message-text">${formatted}</div>
                    <div class="message-time">${timeStr}</div>
                </div>
            `;
            chatContainer.appendChild(div);
        }

        function openAddPageModal() {
            addPageModal.classList.add('active');
            newPageNameInput.value = '';
            setTimeout(() => newPageNameInput.focus(), 300);
        }

        function closeAddPageModal() { addPageModal.classList.remove('active'); }

        function confirmAddPage() {
            const name = newPageNameInput.value.trim();
            if (!name) { showToast('الرجاء إدخال اسم الصفحة', 'warning'); return; }
            pageCounter++;
            const newId = 'page_' + pageCounter + '_' + Date.now();
            pages.push({ id: newId, name: name, icon: 'fa-file' });
            pageConversations[newId] = [];
            savePages();
            renderPages();
            closeAddPageModal();
            switchPage(newId);
            showToast('تم إضافة "' + name + '"', 'success');
        }

        function requestDeletePage(pageId) {
            if (defaultPages.find(d => d.id === pageId)) {
                showToast('لا يمكن حذف الصفحات الأساسية', 'warning');
                return;
            }
            
            const page = pages.find(p => p.id === pageId);
            confirmMessage.textContent = `هل تريد حذف صفحة "${page.name}"؟`;
            confirmCallback = () => {
                pages = pages.filter(p => p.id !== pageId);
                delete pageConversations[pageId];
                savePages();
                if (currentPage === pageId) {
                    switchPage('home');
                }
                renderPages();
                showToast('تم حذف الصفحة', 'success');
            };
            confirmModal.classList.add('active');
        }

        function closeConfirmModal(confirmed) {
            confirmModal.classList.remove('active');
            if (confirmed && confirmCallback) {
                confirmCallback();
            }
            confirmCallback = null;
        }

        // ====== Mobile Sidebar ======
        function toggleMobileSidebar() {
            sidebar.classList.contains('mobile-open') ? closeMobileSidebar() : openMobileSidebar();
        }
        function openMobileSidebar() {
            sidebar.classList.add('mobile-open');
            mobileSidebarOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeMobileSidebar() {
            sidebar.classList.remove('mobile-open');
            mobileSidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ====== Chat Functions ======
        function addMessage(text, sender) {
            welcomeScreen.classList.add('hidden');
            chatContainer.classList.add('active');
            
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            
            if (!pageConversations[currentPage]) {
                pageConversations[currentPage] = [];
            }
            pageConversations[currentPage].push({ text, sender, time });
            if (pageConversations[currentPage].length > 100) {
                pageConversations[currentPage] = pageConversations[currentPage].slice(-100);
            }
            saveAllConversations();
            
            renderMessageToChat(text, sender, time);
            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function processUserInput(inputText) {
            const text = inputText || userInput.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            userInput.value = '';
            userInput.dispatchEvent(new Event('input'));
            
            const normalized = text.toLowerCase();
            
            if (normalized.includes('الوقت') || normalized.includes('التاريخ') || normalized.includes('الساعة')) {
                showTypingIndicator();
                setTimeout(() => { hideTypingIndicator(); addMessage(handleDateTimeRequest(), 'ai'); }, 500);
                return;
            }
            if ((normalized.includes('أنشئ') || normalized.includes('اصنع') || normalized.includes('ارسم')) && normalized.includes('صورة')) {
                const prompt = text.replace(/أنشئ|اصنع|ارسم|صورة|لي|لـ|ل|create|generate|image|picture|of/gi, '').trim() || 'منظر طبيعي';
                generateRealImage(prompt);
                return;
            }
            if (normalized.includes('مساعدة') || normalized.includes('ماذا تستطيع')) {
                addMessage('🚀 **ماذا أستطيع؟**\n• إخبارك بالوقت والتاريخ\n• إنشاء صور بالذكاء الاصطناعي\n• الإجابة عن أسئلة الكتب\n• تحليل الصور\n• التحدث معك صوتياً', 'ai');
                return;
            }
            if (normalized.includes('فهرس') || normalized.includes('تصنيف')) {
                addMessage('📋 **الفهرس الرقمي:**\n• 📚 كتب أدبية (12,450 عنوان)\n• 🔬 كتب علمية (8,320 عنوان)\n• 📜 مخطوطات تاريخية (3,100 عنوان)\n• 🎓 مراجع أكاديمية (15,600 عنوان)\n• 🎨 كتب فنية (5,200 عنوان)', 'ai');
                return;
            }
            
            showTypingIndicator();
            setTimeout(() => {
                hideTypingIndicator();
                addMessage(getAIResponse(text), 'ai');
            }, 800 + Math.random() * 800);
        }

        function sendSuggestion(text) {
            userInput.value = text;
            userInput.dispatchEvent(new Event('input'));
            processUserInput(text);
        }

        function getAIResponse(input) {
            for (const [q, answers] of Object.entries(aiKnowledge)) {
                if (input.toLowerCase().includes(q)) return answers[0];
            }
            const responses = [
                '🤔 **سؤال مثير!**\nلست متأكداً من الإجابة، لكن يمكنني البحث في مكتبة الفجر لمساعدتك.',
                '🧠 **فكرة رائعة!**\nيمكنك تدريبي على هذا السؤال لتصبح معرفتي أفضل.',
                '🌟 **سؤال جميل!**\nجرب البحث في الفهرس الرقمي للمكتبة.'
            ];
            return responses[Math.floor(Math.random() * responses.length)];
        }

        // ====== DateTime ======
        function updateDateTime() {
            const now = new Date();
            window.currentDateTime = {
                time: now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }),
                date: now.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
                hijri: getHijriDate(now)
            };
        }
        function getHijriDate(date) {
            const hijriYear = Math.floor((date.getFullYear() - 622) * (33/32));
            const months = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الآخر', 'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];
            return `${date.getDate()} ${months[Math.floor(Math.random() * 12)]} ${hijriYear} هـ`;
        }
        function handleDateTimeRequest() {
            updateDateTime();
            return `🕒 **الوقت:** ${window.currentDateTime.time}\n📅 **التاريخ:** ${window.currentDateTime.date}\n📿 **هجري:** ${window.currentDateTime.hijri}`;
        }

        // ====== Voice ======
        function setupVoiceRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'ar-SA';
                recognition.continuous = false;
                recognition.interimResults = true;
                isVoiceSupported = true;
                
                recognition.onstart = () => {
                    isRecording = true;
                    voiceIndicator.style.display = 'block';
                    actionButton.classList.add('recording');
                    actionButton.querySelector('i').className = 'fas fa-stop';
                };
                recognition.onresult = (event) => {
                    let final = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        if (event.results[i].isFinal) final = event.results[i][0].transcript;
                    }
                    if (final) { userInput.value = final; userInput.dispatchEvent(new Event('input')); setTimeout(() => processUserInput(final), 300); }
                };
                recognition.onend = () => {
                    isRecording = false;
                    voiceIndicator.style.display = 'none';
                    actionButton.classList.remove('recording');
                    updateActionButton();
                };
                recognition.onerror = (event) => {
                    isRecording = false;
                    voiceIndicator.style.display = 'none';
                    actionButton.classList.remove('recording');
                    updateActionButton();
                    if (event.error === 'no-speech') showToast('لم يتم الكشف عن صوت', 'warning');
                    else if (event.error === 'not-allowed') showToast('تم رفض إذن الميكروفون', 'error');
                };
            }
        }

        function toggleVoiceRecording() {
            if (!isVoiceSupported) return showToast('المتصفح لا يدعم هذه الميزة', 'error');
            isRecording ? recognition.stop() : recognition.start();
        }

        // ====== Images ======
        function toggleAttachment() { imageUpload.click(); }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) return showToast('الرجاء اختيار صورة', 'error');
            event.target.value = '';
            showTypingIndicator();
            const reader = new FileReader();
            reader.onload = function(e) {
                addImageMessage(e.target.result, 'user', 'صورة مرفوعة');
                setTimeout(() => { hideTypingIndicator(); addMessage('✅ **تم استلام الصورة!**', 'ai'); }, 1000);
            };
            reader.readAsDataURL(file);
        }

        function generateRealImage(prompt) {
            showTypingIndicator();
            setTimeout(() => {
                hideTypingIndicator();
                imagesGenerated++;
                localStorage.setItem('imagesGenerated', imagesGenerated.toString());
                const fallbackImages = {
                    'أسد': 'https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=400&h=400&fit=crop',
                    'منظر طبيعي': 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&h=400&fit=crop',
                    'كتاب': 'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&h=400&fit=crop',
                    'قط': 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&h=400&fit=crop'
                };
                let selected = 'https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=400&h=400&fit=crop';
                for (const [key, url] of Object.entries(fallbackImages)) {
                    if (prompt.includes(key)) { selected = url; break; }
                }
                addImageMessage(selected, 'ai', prompt);
                addMessage(`✅ **تم إنشاء الصورة!**\n🎨 ${prompt}\n📊 #IMG-${imagesGenerated.toString().padStart(4, '0')}`, 'ai');
            }, 1500);
        }

        function addImageMessage(src, sender, caption = '') {
            welcomeScreen.classList.add('hidden');
            chatContainer.classList.add('active');
            
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `
                <div class="avatar">${sender === 'ai' ? '<img src="img/mozlee.jpg" alt="" onerror="this.style.display=\'none\';">' : '<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:linear-gradient(135deg, #ff9a9e, #fad0c4);color:white;">👤</span>'}</div>
                <div class="message-content">
                    <img src="${src}" style="max-width:200px;max-height:200px;border-radius:10px;cursor:pointer;margin-bottom:4px;width:100%;height:auto;" onclick="openImageModal('${src}')">
                    ${caption ? `<div style="font-size:10px;color:var(--text-secondary);text-align:center;word-break:break-word;">🖼️ ${caption}</div>` : ''}
                    <div class="message-time">${time}</div>
                </div>
            `;
            chatContainer.appendChild(div);
            
            if (!pageConversations[currentPage]) pageConversations[currentPage] = [];
            pageConversations[currentPage].push({ text: `[صورة: ${caption}]`, sender, time, isImage: true });
            saveAllConversations();
            
            setTimeout(() => {
                chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function openImageModal(src) {
            document.getElementById('imageModal').style.display = 'flex';
            document.getElementById('modalImage').src = src;
            document.body.style.overflow = 'hidden';
        }
        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // ====== Knowledge ======
        function loadDefaultKnowledge() {
            aiKnowledge = {
                'كتاب': ['📚 **عن الكتب:** مكتبتنا تضم أكثر من 50,000 كتاب إلكتروني.'],
                'قراءة': ['📖 **نصائح للقراءة:** حدد هدفاً، ابدأ بـ 20 صفحة يومياً.'],
                'مكتبة': ['🏛️ **مكتبة الفجر الرقمية:** منصة شاملة للقراءة والتعلم.'],
                'دورات': ['🎓 **الدورات:** مهارات القراءة السريعة، فن التلخيص، البحث العلمي.'],
                'فهرس': ['📋 **الفهرس الرقمي:**\n• كتب أدبية (12,450)\n• كتب علمية (8,320)\n• مخطوطات (3,100)\n• مراجع أكاديمية (15,600)\n• كتب فنية (5,200)']
            };
        }

        // ====== تخزين المحادثات ======
        function saveAllConversations() {
            try {
                localStorage.setItem('page_conversations', JSON.stringify(pageConversations));
            } catch (e) {}
        }

        function loadAllConversations() {
            try {
                const saved = localStorage.getItem('page_conversations');
                if (saved) {
                    pageConversations = JSON.parse(saved);
                }
            } catch (e) {
                pageConversations = {};
            }
        }

        // ====== UI Helpers ======
        function autoResizeTextarea() {
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                updateActionButton();
            });
        }

        function updateActionButton() {
            const hasText = userInput.value.trim().length > 0;
            const icon = actionButton.querySelector('i');
            actionButton.className = hasText ? 'send-mode' : 'voice-mode';
            icon.className = hasText ? 'fas fa-paper-plane' : 'fas fa-microphone';
        }

        function handleAction() {
            const text = userInput.value.trim();
            text ? processUserInput(text) : toggleVoiceRecording();
        }

        function showTypingIndicator() { 
            typingIndicator.style.display = 'flex'; 
            setTimeout(() => {
                typingIndicator.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }
        function hideTypingIndicator() { typingIndicator.style.display = 'none'; }

        function showToast(message, type = 'success') {
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.classList.remove('show');
            toastMessage.textContent = message;
            const colors = { 
                success: '3px solid #00d2a0', 
                error: '3px solid #dc5050', 
                info: '3px solid var(--gold)', 
                warning: '3px solid #ffd166' 
            };
            toast.style.borderRight = colors[type] || colors.success;
            setTimeout(() => toast.classList.add('show'), 50);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ====== Event Listeners ======
        function setupEventListeners() {
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (userInput.value.trim()) processUserInput();
                }
            });
            document.getElementById('imageModal').addEventListener('click', (e) => {
                if (e.target.id === 'imageModal') closeImageModal();
            });
            addPageModal.addEventListener('click', (e) => {
                if (e.target === addPageModal) closeAddPageModal();
            });
            confirmModal.addEventListener('click', (e) => {
                if (e.target === confirmModal) closeConfirmModal(false);
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (addPageModal.classList.contains('active')) closeAddPageModal();
                    if (confirmModal.classList.contains('active')) closeConfirmModal(false);
                    if (document.getElementById('imageModal').style.display === 'flex') closeImageModal();
                }
            });
            newPageNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') confirmAddPage();
            });
            
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768 && sidebar.classList.contains('mobile-open')) {
                    closeMobileSidebar();
                }
            });
        }

        // ====== Start ======
        document.addEventListener('DOMContentLoaded', init);

        // ====== Expose Globals ======
        window.sendSuggestion = sendSuggestion;
        window.processUserInput = processUserInput;
        window.handleAction = handleAction;
        window.toggleVoiceRecording = toggleVoiceRecording;
        window.toggleAttachment = toggleAttachment;
        window.switchPage = switchPage;
        window.openAddPageModal = openAddPageModal;
        window.closeAddPageModal = closeAddPageModal;
        window.confirmAddPage = confirmAddPage;
        window.requestDeletePage = requestDeletePage;
        window.closeConfirmModal = closeConfirmModal;
        window.openImageModal = openImageModal;
        window.closeImageModal = closeImageModal;
        window.handleImageUpload = handleImageUpload;
        window.toggleMobileSidebar = toggleMobileSidebar;
        window.closeMobileSidebar = closeMobileSidebar;
    </script>
</body>
</html>
