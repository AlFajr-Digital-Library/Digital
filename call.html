<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>الدعم الفني | مكتبة الفجر الرقمية</title>
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffab00'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Tajawal', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a1f1c 0%, #071513 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .support-wrapper {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .laptop-layout {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 28px;
      justify-content: center;
      align-items: flex-start;
    }

    /* ===== الحجم الأساسي (للهواتف والتابلت - كبير وواضح) ===== */
    .main-card {
      flex: 0 0 500px;
      background: rgba(22, 38, 34, 0.92);
      backdrop-filter: blur(16px);
      border-radius: 56px;
      padding: 28px 24px 36px;
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 180, 70, 0.3);
      transition: all 0.2s;
      margin-right: auto;
    }

    .text-side-card {
      flex: 0 0 440px;
      background: rgba(18, 32, 28, 0.9);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 26px 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
      border: 1px solid #ffb34760;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateX(-20px);
      visibility: hidden;
      margin-left: auto;
    }

    .text-side-card.visible {
      opacity: 1;
      transform: translateX(0);
      visibility: visible;
      animation: fadeSlideRight 0.35s ease-out;
    }

    @keyframes fadeSlideRight {
      from {
        opacity: 0;
        transform: translateX(-25px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* رأس البطاقة (الحجم الكبير) */
    .brand-header {
      text-align: center;
      margin-bottom: 25px;
    }
    .icon-badge {
      background: linear-gradient(145deg, #ffb347, #ff8c1a);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .icon-badge i {
      font-size: 34px;
      color: #1e2c27;
    }
    .brand-header h1 {
      font-size: 1.85rem;
      font-weight: 800;
      background: linear-gradient(to left, #ffe2aa, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-header p {
      color: #9bc1b8;
      font-size: 0.85rem;
    }

    /* حقل الرقم */
    .phone-input-area {
      background: #0b201c;
      border-radius: 80px;
      padding: 5px 20px;
      margin: 20px 0 8px;
      border: 1px solid #ffb34770;
    }
    #phoneNumber {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 2rem;
      font-weight: 600;
      color: #ffcf7a;
      text-align: center;
      font-family: monospace;
      letter-spacing: 3px;
      padding: 14px 0;
      direction: ltr;
    }
    .phone-hint {
      text-align: center;
      font-size: 0.75rem;
      color: #7da89e;
      margin-bottom: 20px;
    }

    /* لوحة الأرقام - حجم كبير */
    .dialpad {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 28px 0 28px;
    }
    .dial-row {
      display: flex;
      justify-content: space-evenly;
      gap: 18px;
    }
    .digit {
      background: #1f3e36;
      width: 82px;
      height: 82px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #ffda9e;
      cursor: pointer;
      box-shadow: 0 9px 0 #0f2620;
      transition: 0.07s linear;
      border: 1px solid #ffb34750;
      user-select: none;
    }
    .digit:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0f2620;
    }
    .action-digit {
      background: #2f4b41;
    }
    .action-digit i {
      font-size: 1.8rem;
    }

    /* زر الاتصال - كبير */
    .call-center {
      display: flex;
      justify-content: center;
      margin: 18px 0 20px;
    }
    .call-round {
      background: linear-gradient(125deg, #00c853, #009624);
      width: 95px;
      height: 95px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0,200,80,0.4);
      transition: 0.1s;
      border: 1px solid #b9ffcf;
    }
    .call-round:active {
      transform: scale(0.94);
    }
    .call-round i {
      font-size: 3rem;
      color: white;
    }

    /* زر عرض النص */
    .show-text-trigger {
      background: #2e4a41;
      border-radius: 60px;
      padding: 12px 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      border: 1px solid #ffb34780;
      transition: 0.2s;
      width: auto;
      margin: 0 auto;
    }
    .show-text-trigger i {
      font-size: 1.1rem;
      color: #ffb347;
    }
    .show-text-trigger span {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f2e8cf;
    }
    .show-text-trigger:active {
      background: #ffb34730;
      transform: scale(0.98);
    }
    .flex-mid {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    /* النص الكتابي */
    .text-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      border-bottom: 1px solid #ffb34760;
      padding-bottom: 10px;
    }
    .text-header h3 {
      color: #ffcd7e;
      font-size: 1.2rem;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .close-text-x {
      background: none;
      border: none;
      color: #ffbc77;
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .close-text-x:hover {
      color: #ffdd99;
      transform: scale(1.1);
    }
    .voice-script-body {
      color: #dfece7;
      font-size: 0.9rem;
      line-height: 1.75;
      text-align: justify;
      max-height: 450px;
      overflow-y: auto;
      padding-left: 5px;
      white-space: pre-line;
      font-weight: 400;
    }

    /* ===== وضع التابلت (عرض متوسط) ===== */
    @media (max-width: 1100px) and (min-width: 769px) {
      .main-card {
        flex: 0 0 460px;
        padding: 22px 20px 30px;
      }
      .digit {
        width: 72px;
        height: 72px;
        font-size: 1.8rem;
      }
      .call-round {
        width: 85px;
        height: 85px;
      }
      .call-round i {
        font-size: 2.6rem;
      }
      #phoneNumber {
        font-size: 1.8rem;
      }
      .text-side-card {
        flex: 0 0 400px;
      }
    }

    /* ===== وضع الهواتف (عرض أقل من 768px) - الحجم الكبير الأصلي ===== */
    @media (max-width: 768px) {
      .laptop-layout {
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
      }
      .main-card {
        flex: 0 0 auto;
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        padding: 28px 24px 36px;
      }
      .text-side-card {
        flex: 0 0 auto;
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
      }
      body {
        padding: 20px 16px;
      }
      /* الحفاظ على الحجم الكبير للهواتف */
      .digit {
        width: 80px;
        height: 80px;
        font-size: 2rem;
      }
      .call-round {
        width: 95px;
        height: 95px;
      }
      #phoneNumber {
        font-size: 2rem;
      }
    }

    /* ===== وضع اللابتوب (عرض 1024px فأكثر) - تصغير الحجم لمنع التمرير الرأسي ===== */
    @media (min-width: 1024px) {
      /* تصغير حجم البطاقة الرئيسية */
      .main-card {
        flex: 0 0 420px;
        padding: 18px 18px 24px;
        border-radius: 44px;
      }
      .brand-header {
        margin-bottom: 12px;
      }
      .icon-badge {
        width: 52px;
        height: 52px;
        margin-bottom: 8px;
      }
      .icon-badge i {
        font-size: 26px;
      }
      .brand-header h1 {
        font-size: 1.45rem;
      }
      .brand-header p {
        font-size: 0.7rem;
      }
      .phone-input-area {
        padding: 3px 16px;
        margin: 10px 0 5px;
      }
      #phoneNumber {
        font-size: 1.5rem;
        padding: 8px 0;
        letter-spacing: 2px;
      }
      .phone-hint {
        font-size: 0.65rem;
        margin-bottom: 10px;
      }
      .dialpad {
        gap: 10px;
        margin: 12px 0 14px;
      }
      .dial-row {
        gap: 12px;
      }
      .digit {
        width: 60px;
        height: 60px;
        font-size: 1.6rem;
        box-shadow: 0 6px 0 #0f2620;
      }
      .digit:active {
        transform: translateY(3px);
        box-shadow: 0 3px 0 #0f2620;
      }
      .action-digit i {
        font-size: 1.4rem;
      }
      .call-center {
        margin: 8px 0 12px;
      }
      .call-round {
        width: 72px;
        height: 72px;
      }
      .call-round i {
        font-size: 2.2rem;
      }
      .show-text-trigger {
        padding: 8px 14px;
        gap: 8px;
      }
      .show-text-trigger span {
        font-size: 0.8rem;
      }
      .flex-mid {
        margin-top: 6px;
      }
      /* تصغير البطاقة الجانبية أيضاً */
      .text-side-card {
        flex: 0 0 380px;
        padding: 18px 20px;
        border-radius: 40px;
      }
      .text-header {
        margin-bottom: 12px;
        padding-bottom: 8px;
      }
      .text-header h3 {
        font-size: 1rem;
      }
      .voice-script-body {
        font-size: 0.8rem;
        line-height: 1.6;
        max-height: 380px;
      }
      /* منع التمرير الزائد للصفحة على اللابتوب */
      body {
        padding: 16px 20px;
        align-items: center;
      }
      .support-wrapper {
        max-height: 98vh;
      }
    }

    /* للشاشات الكبيرة جداً (1400px+) نترك مسافة معقولة */
    @media (min-width: 1400px) {
      .main-card {
        flex: 0 0 440px;
      }
      .text-side-card {
        flex: 0 0 400px;
      }
    }

    @media (max-width: 550px) {
      .digit {
        width: 68px;
        height: 68px;
        font-size: 1.7rem;
      }
      .call-round {
        width: 78px;
        height: 78px;
      }
      #phoneNumber {
        font-size: 1.6rem;
      }
      .dial-row {
        gap: 12px;
      }
      .main-card {
        padding: 22px 16px 30px;
      }
    }

    /* التنبيه والنوافذ المنبثقة */
    .toast-notify {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2f2adb;
      backdrop-filter: blur(12px);
      color: #ffeaac;
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 0.85rem;
      z-index: 1100;
      display: none;
      white-space: nowrap;
      font-weight: 500;
      border-right: 3px solid #ffab00;
    }

    #overlayModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(6px);
      z-index: 998;
    }
    #callChoiceModal {
      display: none;
      position: fixed;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, 50%);
      background: #212e2ae6;
      backdrop-filter: blur(24px);
      border-radius: 48px;
      width: 86%;
      max-width: 340px;
      padding: 28px 20px 32px;
      text-align: center;
      z-index: 999;
      border: 1px solid #ffb347aa;
      animation: modalPop 0.25s ease-out;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: translate(-50%, 70%); }
      to { opacity: 1; transform: translate(-50%, 50%); }
    }
    .modal-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffdd99;
      margin-bottom: 24px;
    }
    .choice-btn {
      width: 90%;
      margin: 12px auto;
      padding: 14px 0;
      border-radius: 60px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
    }
    .choice-phone {
      background: linear-gradient(95deg, #ffcd4a, #ffa129);
      color: #202d1e;
    }
    .choice-meet {
      background: linear-gradient(95deg, #1e6e3e, #0a4f2a);
      color: white;
    }
    #closeModalX {
      position: absolute;
      top: 14px;
      left: 18px;
      background: none;
      border: none;
      font-size: 26px;
      color: #ccc;
      cursor: pointer;
    }
    body.modal-open *:not(#callChoiceModal):not(#callChoiceModal *) {
      pointer-events: none !important;
    }
  </style>
</head>
<body>

<div class="support-wrapper">
  <div class="laptop-layout">
    <div class="main-card">
      <div class="brand-header">
        <div class="icon-badge">
          <i class="fas fa-headset"></i>
        </div>
        <h1>الدعم الفني</h1>
        <p>مكتبة الفجر الرقمية · تواصل فوري</p>
      </div>

      <div class="phone-input-area">
        <input type="tel" id="phoneNumber" readonly placeholder="رقم الجوال" inputmode="numeric">
      </div>
      <div class="phone-hint">
        <i class="fas fa-mobile-alt"></i> أدخل رقم هاتفك المحمول
      </div>

      <div class="dialpad">
        <div class="dial-row">
          <div class="digit" data-digit="1">1</div>
          <div class="digit" data-digit="2">2</div>
          <div class="digit" data-digit="3">3</div>
        </div>
        <div class="dial-row">
          <div class="digit" data-digit="4">4</div>
          <div class="digit" data-digit="5">5</div>
          <div class="digit" data-digit="6">6</div>
        </div>
        <div class="dial-row">
          <div class="digit" data-digit="7">7</div>
          <div class="digit" data-digit="8">8</div>
          <div class="digit" data-digit="9">9</div>
        </div>
        <div class="dial-row">
          <div class="digit action-digit" id="deleteDigit"><i class="fas fa-backspace"></i></div>
          <div class="digit" data-digit="0">0</div>
          <div class="digit action-digit" id="voicePlayIcon"><i class="fas fa-headphones"></i></div>
        </div>
      </div>

      <div class="call-center">
        <div class="call-round" id="callMainButton">
          <i class="fas fa-phone-alt"></i>
        </div>
      </div>

      <div class="flex-mid">
        <div class="show-text-trigger" id="showTextBtn">
          <i class="fas fa-file-lines"></i>
          <span>📄 عرض نص القائمة الصوتية</span>
        </div>
      </div>
    </div>

    <div id="textSidePanel" class="text-side-card">
      <div class="text-header">
        <h3><i class="fas fa-ear-listen"></i> نص القائمة الصوتية</h3>
        <button id="closeTextSideBtn" class="close-text-x"><i class="fas fa-times-circle"></i></button>
      </div>
      <div class="voice-script-body" id="voiceScriptContainer"></div>
    </div>
  </div>
</div>

<div id="toastMsg" class="toast-notify"></div>
<div id="overlayModal"></div>
<div id="callChoiceModal">
  <button id="closeModalX">✕</button>
  <div class="modal-title"><i class="fas fa-handshake"></i> اختر وسيلة التواصل</div>
  <button class="choice-btn choice-phone" id="phoneOptionBtn">📞 اتصال هاتفي</button>
  <button class="choice-btn choice-meet" id="meetOptionBtn">🎥 Google Meet</button>
</div>

<audio id="preRecordedAudioFile" src="i.m4a" preload="auto"></audio>

<script>
  (function() {
    const phoneInput = document.getElementById('phoneNumber');
    const digitBtns = document.querySelectorAll('.digit[data-digit]');
    const deleteBtn = document.getElementById('deleteDigit');
    const callMain = document.getElementById('callMainButton');
    const toast = document.getElementById('toastMsg');
    const overlayModal = document.getElementById('overlayModal');
    const callModal = document.getElementById('callChoiceModal');
    const closeModalBtn = document.getElementById('closeModalX');
    const phoneOption = document.getElementById('phoneOptionBtn');
    const meetOption = document.getElementById('meetOptionBtn');
    const voicePlayIcon = document.getElementById('voicePlayIcon');
    const showTextBtn = document.getElementById('showTextBtn');
    const textSidePanel = document.getElementById('textSidePanel');
    const closeTextSide = document.getElementById('closeTextSideBtn');
    const voiceScriptContainer = document.getElementById('voiceScriptContainer');
    
    const fullVoiceText = `مرحباً بك في مكتبة الفجر الرقمية.\n\nللاتصال بمسؤول القسم:\n• اضغط الرقم 1 للدعم الفني.\n• اضغط الرقم 2 للاستفسارات حول الكتب والخدمات.\n• اضغط الرقم 3 للحصول على معلومات حول العروض والفعاليات.\n• اضغط الرقم 4 للتحدث إلى أحد ممثلي خدمة العملاء.\n• اضغط الرقم 0 إذا كنت ترغب في سماع هذه القائمة مرة أخرى.\n• اضغط النجمة للرجوع.\n\nشكراً لاتصالك بمكتبة الفجر الرقمية، نتمنى لك يوماً سعيداً.`;
    
    voiceScriptContainer.innerText = fullVoiceText;
    
    const audioElem = document.getElementById('preRecordedAudioFile');
    let speechSynth = window.speechSynthesis;
    let currentSpeech = null;
    let isAudioActive = false;
    
    function showToast(msg, isErr = false) {
      toast.textContent = msg;
      toast.style.display = 'block';
      toast.style.backgroundColor = isErr ? '#c73b2cdd' : '#1f4a40dd';
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => {
          toast.style.display = 'none';
          toast.style.opacity = '1';
        }, 200);
      }, 2500);
    }
    
    function killAllAudio() {
      if (speechSynth && speechSynth.speaking) {
        speechSynth.cancel();
      }
      if (currentSpeech) currentSpeech = null;
      if (audioElem && !audioElem.paused) {
        audioElem.pause();
        audioElem.currentTime = 0;
      }
      isAudioActive = false;
    }
    
    function playVoiceGuide() {
      killAllAudio();
      if (audioElem && audioElem.src && audioElem.src !== window.location.href && audioElem.src !== "") {
        audioElem.play().then(() => {
          isAudioActive = true;
          audioElem.onended = () => { isAudioActive = false; };
          audioElem.onerror = () => { fallbackToSpeech(); };
        }).catch(() => { fallbackToSpeech(); });
      } else {
        fallbackToSpeech();
      }
    }
    
    function fallbackToSpeech() {
      if (!speechSynth) {
        showToast("المتصفح لا يدعم القراءة الصوتية", true);
        return;
      }
      speechSynth.cancel();
      const utterance = new SpeechSynthesisUtterance(fullVoiceText);
      utterance.lang = 'ar-SA';
      utterance.rate = 0.9;
      utterance.pitch = 1.05;
      utterance.onstart = () => { isAudioActive = true; };
      utterance.onend = () => { isAudioActive = false; currentSpeech = null; };
      utterance.onerror = () => { isAudioActive = false; };
      currentSpeech = utterance;
      speechSynth.speak(utterance);
      showToast("🎧 تشغيل القائمة الصوتية ...", false);
    }
    
    voicePlayIcon.addEventListener('click', () => {
      if (isAudioActive) {
        killAllAudio();
        showToast("⏹ تم إيقاف الصوت", false);
      } else {
        playVoiceGuide();
      }
    });
    
    showTextBtn.addEventListener('click', () => {
      if (textSidePanel.classList.contains('visible')) {
        textSidePanel.classList.remove('visible');
        showToast("تم إخفاء النص الكتابي", false);
      } else {
        textSidePanel.classList.add('visible');
        showToast("📖 ظهر النص الكتابي للقائمة", false);
        if (window.innerWidth <= 768) {
          textSidePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }
    });
    
    closeTextSide.addEventListener('click', () => {
      textSidePanel.classList.remove('visible');
      showToast("تم إغلاق النص", false);
    });
    
    digitBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const digit = btn.getAttribute('data-digit');
        if (digit !== null) {
          let val = phoneInput.value;
          if (val.length < 12) {
            phoneInput.value = val + digit;
          } else {
            showToast("لا يمكن إدخال أكثر من 12 رقم", true);
          }
        }
      });
    });
    
    deleteBtn.addEventListener('click', () => {
      phoneInput.value = phoneInput.value.slice(0, -1);
    });
    
    let longTimer;
    deleteBtn.addEventListener('mousedown', () => {
      longTimer = setTimeout(() => {
        phoneInput.value = '';
        showToast("تم مسح الرقم بالكامل", false);
      }, 600);
    });
    deleteBtn.addEventListener('mouseup', () => clearTimeout(longTimer));
    deleteBtn.addEventListener('mouseleave', () => clearTimeout(longTimer));
    deleteBtn.addEventListener('touchend', () => clearTimeout(longTimer));
    
    function isValidPhone(num) {
      const clean = num.trim();
      return clean.length >= 7 && clean.length <= 12 && /^\d+$/.test(clean);
    }
    
    function openCallModal() {
      const phoneVal = phoneInput.value.trim();
      if (!isValidPhone(phoneVal)) {
        showToast("يرجى إدخال رقم هاتف صحيح (7-12 أرقام)", true);
        return;
      }
      if (callModal.style.display === 'block') return;
      overlayModal.style.display = 'block';
      callModal.classList.remove('hide');
      callModal.style.display = 'block';
      document.body.classList.add('modal-open');
    }
    
    function closeModalWindow() {
      callModal.classList.add('hide');
      setTimeout(() => {
        callModal.style.display = 'none';
        overlayModal.style.display = 'none';
        document.body.classList.remove('modal-open');
      }, 200);
    }
    
    function startPhoneCall() {
      const number = phoneInput.value.trim();
      if (!isValidPhone(number)) {
        showToast("رقم غير صالح للمكالمة", true);
        closeModalWindow();
        return;
      }
      window.location.href = `tel:${number}`;
      closeModalWindow();
      showToast(`📞 جاري الاتصال بـ ${number}`, false);
    }
    
    function openMeet() {
      const meetLink = "https://meet.google.com/fjr-digital-support";
      window.open(meetLink, '_blank');
      closeModalWindow();
      showToast("🚀 تم فتح اجتماع Google Meet", false);
    }
    
    callMain.addEventListener('click', openCallModal);
    phoneOption.addEventListener('click', startPhoneCall);
    meetOption.addEventListener('click', openMeet);
    closeModalBtn.addEventListener('click', closeModalWindow);
    overlayModal.addEventListener('click', closeModalWindow);
    
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        if (phoneInput.value.length < 12) {
          phoneInput.value += e.key;
          e.preventDefault();
        }
      } else if (e.key === 'Backspace') {
        phoneInput.value = phoneInput.value.slice(0, -1);
        e.preventDefault();
      } else if (e.key === 'Enter') {
        openCallModal();
        e.preventDefault();
      }
    });
    
    callMain.addEventListener('click', () => {
      if (isAudioActive) killAllAudio();
    });
    
    setTimeout(() => {
      showToast("✨ اضغط على عرض النص لقراءة القائمة الصوتية", false);
    }, 700);
    
    document.addEventListener('click', function(e) {
      if (textSidePanel.classList.contains('visible') && window.innerWidth <= 768) {
        if (!textSidePanel.contains(e.target) && !showTextBtn.contains(e.target)) {
          textSidePanel.classList.remove('visible');
        }
      }
    });
    
    textSidePanel.classList.remove('visible');
  })();
</script>
</body>
